<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">

  @for (kpi of kpis; track kpi.label) {

    <div class="rounded-lg border border-neutral-800 bg-neutral-950/40 p-3">

      <p class="text-[11px] text-neutral-400">
        {{ kpi.label }}
      </p>

 
      <div class="mt-2">
        <div class="text-3xl font-semibold text-white leading-none">
          {{ kpi.value }}%
        </div>


        <div class="mt-1 flex items-center gap-1.5">
          <lucide-icon
            [img]="kpi.change >= 0 ? TrendingUp : TrendingDown"
            class="h-3 w-3"
            [class.text-emerald-400]="kpi.change >= 0"
            [class.text-red-400]="kpi.change < 0"
          ></lucide-icon>

          <span
            class="text-[11px] font-medium"
            [class.text-emerald-400]="kpi.change >= 0"
            [class.text-red-400]="kpi.change < 0"
          >
            {{ changeText(kpi.change) }}
          </span>
        </div>
      </div>

      <div class="mt-3 flex items-end justify-between">
        <div class="text-[10px] text-neutral-500">Progress</div>

        <div class="text-right">
          <div class="text-[10px] text-neutral-500">Target</div>
          <div class="text-sm font-semibold text-neutral-200">
            {{ kpi.target }}%
          </div>
        </div>
      </div>

      <div class="mt-2 h-1.5 w-full rounded-full bg-neutral-900 overflow-hidden">
        <div
          class="h-1.5 rounded-full bg-blue-600"
          [style.width]="progressWidth(kpi.value, kpi.target)"
        ></div>
      </div>

    </div>

  }

</div>
