<div class="rounded-xl border border-neutral-800 bg-neutral-950/40 p-4">
  <div class="pb-2">
    <div class="text-base font-medium text-white">Supplier Performance Ranking</div>
  </div>

  <div class="rounded-lg border border-neutral-800 overflow-hidden mt-3">
    <table class="w-full text-sm">
      <thead>
        <tr class="bg-neutral-900/40">
          <th class="text-left text-neutral-400 font-medium px-4 py-3 w-12">#</th>
          <th class="text-left text-neutral-400 font-medium px-4 py-3">Supplier</th>
          <th class="text-center text-neutral-400 font-medium px-4 py-3">Overall</th>
          <th class="text-center text-neutral-400 font-medium px-4 py-3">Trend</th>
        </tr>
      </thead>

      <tbody>
        @for (supplier of rows; track supplier.id) {
          <tr class="border-t border-neutral-900 hover:bg-neutral-900/40 transition">
            <td class="px-1 py-1 text-neutral-400 font-medium">
              {{ $index + 1 }}
            </td>

            <td class="px-4 py-3">
              <div>
                <p class="font-medium text-white leading-tight">{{ supplier.name }}</p>
                <p class="text-xs text-neutral-500 mt-0">{{ supplier.category }}</p>
              </div>
            </td>

            <td class="px-4 py-3 text-center">
              <span
                class="inline-flex items-center justify-center px-2.5 py-1 rounded-md border text-xs font-semibold"
                [ngClass]="scoreClass(overallRounded(supplier))"
              >
                {{ overallRounded(supplier) }}%
              </span>
            </td>

            <td class="px-4 py-3 text-center">
              <lucide-icon
                [img]="trendIcon($index)"
                class="h-4 w-4 inline-block"
                [ngClass]="trendColorClass($index)"
              ></lucide-icon>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
