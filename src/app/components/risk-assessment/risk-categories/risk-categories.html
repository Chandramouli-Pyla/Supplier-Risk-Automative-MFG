<div class="rounded-xl border border-neutral-800 bg-neutral-950/40 p-4">
  <div class="pb-2">
    <div class="text-base font-medium text-white">Risk Categories Overview</div>
  </div>

  <div class="mt-3 space-y-4">
    @for (c of categories; track c.name) {
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-neutral-900/60 border border-neutral-800">
              <lucide-icon [img]="c.icon" class="h-5 w-5 text-neutral-400"></lucide-icon>
            </div>

            <div>
              <p class="text-sm font-medium text-white">{{ c.name }}</p>
              <p class="text-xs text-neutral-500">{{ c.description }}</p>
            </div>
          </div>

          <div class="text-right">
            <p class="text-lg font-semibold text-white">{{ c.risk }}%</p>
            <p class="text-xs" [class]="c.level.cls">{{ c.level.label }}</p>
          </div>
        </div>

        <div class="h-1.5 w-full rounded-full bg-neutral-900 overflow-hidden">
          <div
            class="h-1.5 rounded-full"
            [style.width.%]="c.risk"
            [ngStyle]="progressStyle(c.color)"
          ></div>
        </div>
      </div>
    }
  </div>
</div>
