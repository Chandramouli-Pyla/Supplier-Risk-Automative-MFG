<div class="flex flex-col gap-4 md:flex-row md:items-center justify-between bg-[#111111] border-neutral-800 rounded-xl border p-4 shadow-sm mb-6">
  
  <div class="relative flex-1 max-w-2xl">
    <lucide-icon [img]="Search" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-neutral-500"></lucide-icon>
    <input
      type="text"
      placeholder="Search by name, code, or location..."
      [ngModel]="searchQuery"
      (ngModelChange)="onSearchChange($event)"
      class="w-full rounded-md border border-neutral-800 bg-neutral-900/50 px-10 py-2.5 text-sm text-white placeholder:text-neutral-500 focus:outline-none focus:ring-1 focus:ring-neutral-700"
    />
  </div>

  <div class="flex flex-wrap items-center gap-3">
    
    <div class="relative">
      <select
        [value]="categoryFilter"
        (change)="onCategoryChange($event)"
        class="appearance-none rounded-md border border-neutral-800 bg-neutral-900/50 px-4 py-2.5 pr-8 text-sm text-white focus:outline-none focus:ring-1 focus:ring-neutral-700 min-w-[160px] cursor-pointer"
      >
        <option value="All Categories">All Categories</option>
        @for (category of categories; track category) {
          <option [value]="category">{{category}}</option>
        }
      </select>
      <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-neutral-500">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </div>
    </div>

    <div class="relative">
      <select
        [value]="riskFilter"
        (change)="onRiskChange($event)"
        class="appearance-none rounded-md border border-neutral-800 bg-neutral-900/50 px-4 py-2.5 pr-8 text-sm text-white focus:outline-none focus:ring-1 focus:ring-neutral-700 min-w-[140px] cursor-pointer"
      >
        <option value="All Risk Levels">All Risk Levels</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
      <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-neutral-500">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </div>
    </div>

    <div class="relative">
      <select
        [value]="statusFilter"
        (change)="onStatusChange($event)"
        class="appearance-none rounded-md border border-neutral-800 bg-neutral-900/50 px-4 py-2.5 pr-8 text-sm text-white focus:outline-none focus:ring-1 focus:ring-neutral-700 min-w-[130px] cursor-pointer"
      >
        <option value="All Statuses">All Statuses</option>
        <option value="active">Active</option>
        <option value="under-review">Under Review</option>
        <option value="suspended">Suspended</option>
      </select>
      <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-neutral-500">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </div>
    </div>

  </div>
</div>
