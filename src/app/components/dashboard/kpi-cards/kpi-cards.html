<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
  @for (k of kpis; track k.title) {
    <div class="rounded-xl border border-neutral-800 bg-neutral-950/40 p-6">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm text-neutral-500">{{ k.title }}</p>
          <p class="mt-1 text-3xl font-semibold text-white">{{ k.value }}</p>
          <p class="mt-1 text-xs" [class]="changeClass(k.changeType)">
            {{ k.change }}
          </p>
        </div>

        <div class="flex h-12 w-12 items-center justify-center rounded-lg" [class]="k.iconBg">
          <lucide-icon [img]="k.icon" class="h-6 w-6" [class]="k.iconColor"></lucide-icon>
        </div>
      </div>
    </div>
  }
</div>
