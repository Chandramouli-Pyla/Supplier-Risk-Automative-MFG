<header class="h-20 border-b border-neutral-800 bg-[#0a0a0a] flex items-center justify-between px-8 w-full shrink-0">
  
  <div class="flex flex-col">
    <h1 class="text-xl font-bold tracking-tight text-white leading-none">{{ title }}</h1>
    <p class="text-neutral-500 mt-1 text-xs">{{ subtitle }}</p>
  </div>

  <div class="flex items-center gap-6">
    
    <div class="relative w-72">
      <lucide-icon [img]="Search" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-neutral-500"></lucide-icon>
      <input 
        type="text" 
        placeholder="Search suppliers..." 
        class="w-full bg-neutral-900/50 border border-neutral-800 rounded-md py-1.5 pl-10 pr-4 text-sm text-white focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all placeholder:text-neutral-600"
      >
    </div>

    <button class="relative p-2 text-neutral-400 hover:text-white transition-colors">
      <lucide-icon [img]="Bell" class="h-5 w-5"></lucide-icon>
      <span class="absolute top-1.5 right-1.5 w-4 h-4 bg-red-600 text-[10px] font-bold text-white rounded-full flex items-center justify-center border-2 border-[#0a0a0a]">
        1
      </span>
    </button>

    <div class="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center text-white cursor-pointer hover:bg-blue-500 transition-colors shadow-lg shadow-blue-900/20">
      <lucide-icon [img]="User" class="h-4 w-4"></lucide-icon>
    </div>

  </div>
</header>
