<header class="flex items-center justify-between px-8 py-6 bg-[#0a0a0a] border-b border-neutral-800">
  
  <div>
    <h1 class="text-2xl font-bold tracking-tight text-white">{{ pageTitle }}</h1>
    <p class="text-sm text-neutral-500 mt-1">{{ pageSubtitle }}</p>
  </div>

  <div class="flex items-center gap-6">
    
    <div class="relative w-80">
      <lucide-icon [img]="Search" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-neutral-500"></lucide-icon>
      <input 
        type="text" 
        placeholder="Search suppliers..." 
        class="w-full bg-black border border-neutral-800 rounded-lg pl-10 pr-4 py-2.5 text-sm text-white placeholder:text-neutral-600 focus:outline-none focus:border-neutral-600 transition-colors"
      >
    </div>

    <div class="flex items-center gap-4">
      <button class="relative p-2 text-neutral-400 hover:text-white transition-colors rounded-full hover:bg-neutral-800/50">
        <lucide-icon [img]="Bell" class="h-5 w-5"></lucide-icon>
        <span class="absolute top-1.5 right-1.5 flex h-3.5 w-3.5 items-center justify-center rounded-full bg-red-600 text-[9px] font-bold text-white border-2 border-[#0a0a0a]">1</span>
      </button>
      
      <button class="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center text-white hover:bg-blue-700 transition-colors">
        <lucide-icon [img]="User" class="h-4 w-4"></lucide-icon>
      </button>
    </div>
    
  </div>
</header>
