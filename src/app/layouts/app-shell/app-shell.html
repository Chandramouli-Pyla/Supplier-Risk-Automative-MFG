<div class="h-screen w-screen bg-black flex overflow-hidden">
  @if (isSidebarOpen) {
    <div
      class="fixed inset-0 z-40 bg-black/80 backdrop-blur-sm md:hidden"
      (click)="onSidebarClose()"
    ></div>
  }

  <app-sidebar
    [isOpen]="isSidebarOpen"
    (closeSidebar)="onSidebarClose()"
    class="fixed inset-y-0 left-0 z-50 w-64 transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 shrink-0"
    [class.translate-x-0]="isSidebarOpen"
    [class.-translate-x-full]="!isSidebarOpen"
  >
  </app-sidebar>

  <div class="flex-1 flex flex-col min-w-0 bg-black">
    <div class="sticky top-0 z-30">
      <app-header (toggleSidebar)="onSidebarToggle()"></app-header>
    </div>

    <main class="flex-1 overflow-y-auto overflow-x-hidden">
      <div class="p-4 md:p-6">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
