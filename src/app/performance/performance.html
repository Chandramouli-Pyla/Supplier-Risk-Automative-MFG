<div class="space-y-5">
    <div class="flex items-start justify-between gap-6">
        <div>
            <h2 class="text-base font-semibold text-white">Performance Analytics</h2>
        </div>

        <div class="flex items-center gap-3">

            <select [(ngModel)]="timeRange" class="bg-neutral-900/50 border border-neutral-800 rounded-md px-3 py-2
               text-sm text-white focus:outline-none focus:ring-1 focus:ring-blue-500 w-52">
                <option value="1m">Last 1 Month</option>
                <option value="3m">Last 3 Months</option>
                <option value="6m">Last 6 Months</option>
                <option value="1y">Last 1 Year</option>
            </select>
        </div>
    </div>

    <app-performance-overview></app-performance-overview>
    <div class="mt-4">
        <app-performance-charts [timeRange]="timeRange"></app-performance-charts>
    </div>
<div class="mt-6 grid gap-4 lg:grid-cols-2">

  <app-supplier-comparison></app-supplier-comparison>

  <app-performance-table
    [searchText]="searchText">
  </app-performance-table>

</div>
</div>
