<div class="flex items-center justify-center min-h-screen bg-neutral-950">

  <div class="bg-neutral-900 border border-neutral-800 rounded-lg p-8 w-[380px]">

    <h2 class="text-xl font-semibold text-white mb-6 text-center">
      Supplier Risk Login
    </h2>

    <div class="space-y-4">

      <div>
        <label class="text-sm text-neutral-400">Username</label>
        <input
          type="text"
          [(ngModel)]="username"
          class="w-full mt-1 bg-neutral-800 border border-neutral-700 rounded-md p-2 text-white focus:outline-none"
        />
      </div>

      <div>
        <label class="text-sm text-neutral-400">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          class="w-full mt-1 bg-neutral-800 border border-neutral-700 rounded-md p-2 text-white focus:outline-none"
        />
      </div>

      <div *ngIf="error" class="text-red-400 text-sm">
        {{ error }}
      </div>

      <button
        (click)="login()"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-md mt-2"
      >
        Login
      </button>

    </div>

  </div>

</div>
